# nginx for the gbrain-atlas SPA. Copied into the frontend image by
# Dockerfile.frontend. SPA fallback so client-side routes survive a refresh/
# deep-link. Optional reverse-proxy for /mcp → backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA fallback — unknown paths return index.html (not 404)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy the gbrain MCP through the frontend origin.
    # location /mcp {
    #     proxy_pass http://backend:3000/mcp;   # service name from docker-compose
    #     proxy_set_header Host $host;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_read_timeout 300s;
    # }
}
