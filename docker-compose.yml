services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    volumes:
      # Persist the brain directory across container restarts
      - ./backend/brain:/app/brain
      # Obsidian vault mirrored into the container for the watcher.
      # Defaults to ./vault — override VAULT_DIR in .env to point at your own.
      - ${VAULT_DIR:-./vault}:/app/vault
      # Optional (author CI): a Plumbline checkout mounted read-only.
      # - ${PLUMBLINE_DIR:-./Plumbline}:/root/Plumbline:ro
    ports:
      - "${BACKEND_PORT:-3000}:3000"   # Host:Container
    environment:
      - GBRAIN_HTTP_CORS_ORIGIN=${GBRAIN_HTTP_CORS_ORIGIN:-*}
      - PORT=${PORT:-3000}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://172.17.0.1:11434}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://172.17.0.1:11434}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-ollama}
      - QDRANT_HOST=${QDRANT_HOST:-http://172.17.0.1:6333}
      - GBRAIN_EMBEDDING_MODEL=${GBRAIN_EMBEDDING_MODEL:-bge-m3}
      - GBRAIN_EMBEDDING_DIMENSIONS=${GBRAIN_EMBEDDING_DIMENSIONS:-1024}
      - GBRAIN_AI_EMBED_TIMEOUT_MS=${GBRAIN_AI_EMBED_TIMEOUT_MS:-60000}
      - MCP_GBRAIN_API_KEY=${MCP_GBRAIN_API_KEY:-}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"   # Host:Container
    depends_on:
      - backend
    restart: unless-stopped
